services:
  greenmail-test:
    image: greenmail/standalone:2.1.8
    restart: unless-stopped
    environment:
      GREENMAIL_OPTS: >-
        -Dgreenmail.setup.test.all
        -Dgreenmail.hostname=0.0.0.0
        -Dgreenmail.auth.disabled
    ports:
      - "${GREENMAIL_SMTP_BIND:-127.0.0.1:3025}:3025"
      - "${GREENMAIL_IMAP_BIND:-127.0.0.1:3143}:3143"

  postgres-test:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: emailhub_test
      POSTGRES_PASSWORD: emailhub_test
      POSTGRES_DB: emailhub_sync_jobs_test
    ports:
      - "${POSTGRES_TEST_BIND:-127.0.0.1:55432}:5432"
    volumes:
      - emailhub-postgres-test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailhub_test -d emailhub_sync_jobs_test"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  emailhub-postgres-test:
