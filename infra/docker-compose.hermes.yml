services:
  hermes:
    image: ${HERMES_GATEWAY_IMAGE:-ghcr.io/berriai/litellm:v1.89.1}
    restart: unless-stopped
    environment:
      LITELLM_MASTER_KEY: ${HERMES_API_KEY:?Set HERMES_API_KEY for the bundled Hermes gateway}
      HERMES_LITELLM_MODEL: ${HERMES_LITELLM_MODEL:-openai/gpt-4o-mini}
      HERMES_LITELLM_API_KEY: ${HERMES_LITELLM_API_KEY:-}
      HERMES_LITELLM_API_BASE: ${HERMES_LITELLM_API_BASE:-https://api.openai.com/v1}
      LITELLM_LOG: ${HERMES_LITELLM_LOG:-INFO}
    volumes:
      - ./litellm/hermes-config.yaml:/app/config.yaml:ro
    command: ["--port", "4000", "--config", "/app/config.yaml"]
    ports:
      - "${HERMES_BIND:-127.0.0.1:8081}:4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys,urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=5); sys.exit(0)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    depends_on:
      hermes:
        condition: service_healthy
    environment:
      HERMES_PROVIDER: hermes
      HERMES_CHAT_COMPLETIONS_URL: http://hermes:4000/v1/chat/completions
      HERMES_API_KEY: ${HERMES_API_KEY:?Set HERMES_API_KEY for the bundled Hermes gateway}
      HERMES_MODEL: hermes-email
