services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-emailhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emailhub_dev}
      POSTGRES_DB: ${POSTGRES_DB:-emailhub}
    volumes:
      - emailhub-postgres:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emailhub} -d ${POSTGRES_DB:-emailhub}"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis-engine:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "10000", "--save", "300", "10", "--save", "900", "1", "--maxmemory-policy", "noeviction"]
    volumes:
      - emailhub-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

  emailengine:
    image: ${EMAILENGINE_IMAGE:-postalsys/emailengine:v2.71.0@sha256:4f732fd40e39f8e3af0b3d1580f1972a7e7270741be510f217a6b07eac5b0efc}
    restart: unless-stopped
    ulimits:
      nofile:
        soft: ${EMAILHUB_NOFILE_SOFT:-65535}
        hard: ${EMAILHUB_NOFILE_HARD:-65535}
    depends_on:
      redis-engine:
        condition: service_healthy
    environment:
      EENGINE_REDIS: redis://redis-engine:6379/0
      EENGINE_SECRET: ${EENGINE_SECRET:-dev-emailhub-secret}
      EENGINE_PREPARED_TOKEN: ${EENGINE_PREPARED_TOKEN:-}
      EENGINE_SETTINGS: >-
        {"webhooks":"${EMAILENGINE_WEBHOOK_URL:-http://api:8080/api/webhooks/emailengine}","webhooksEnabled":true,"webhookEvents":["*"],"serviceSecret":"${EMAILENGINE_WEBHOOK_SECRET:-dev-emailhub-secret}","authServer":"${EMAILENGINE_AUTH_SERVER_URL:-http://emailengine:${EMAILENGINE_AUTH_SERVER_SECRET:-dev-emailhub-secret}@api:8080/api/mail-engine/auth-server}","notifyText":false,"notifyAttachments":false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-emailhub}
      POSTGRES_DB: ${POSTGRES_DB:-emailhub}
      PGPASSWORD: ${POSTGRES_PASSWORD:-emailhub_dev}
    volumes:
      - ./migrations:/migrations:ro
    command:
      - sh
      - -c
      - |
        set -e
        for file in /migrations/*.sql; do
          echo "applying $${file}"
          psql -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -v ON_ERROR_STOP=1 -f "$${file}"
        done

  api:
    build:
      context: ..
      dockerfile: apps/api-node/Dockerfile
    restart: unless-stopped
    ulimits:
      nofile:
        soft: ${EMAILHUB_NOFILE_SOFT:-65535}
        hard: ${EMAILHUB_NOFILE_HARD:-65535}
    depends_on:
      postgres:
        condition: service_healthy
      emailengine:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DIAGNOSTICS_LOG_CAPACITY: ${DIAGNOSTICS_LOG_CAPACITY:-500}
      EMAILHUB_ALLOW_DEV_SECRETS: ${EMAILHUB_ALLOW_DEV_SECRETS:-true}
      EMAILHUB_API_TOKEN: ${EMAILHUB_API_TOKEN:-}
      EMAILHUB_REQUIRE_API_TOKEN: ${EMAILHUB_REQUIRE_API_TOKEN:-false}
      EMAILHUB_ATTACHMENT_DOWNLOAD_MAX_BYTES: ${EMAILHUB_ATTACHMENT_DOWNLOAD_MAX_BYTES:-26214400}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-emailhub}:${POSTGRES_PASSWORD:-emailhub_dev}@postgres:5432/${POSTGRES_DB:-emailhub}}
      EMAILENGINE_URL: http://emailengine:3000
      EMAILENGINE_ACCESS_TOKEN: ${EMAILENGINE_ACCESS_TOKEN:-}
      EENGINE_PREPARED_TOKEN: ${EENGINE_PREPARED_TOKEN:-}
      EENGINE_SECRET: ${EENGINE_SECRET:-dev-emailhub-secret}
      EMAILENGINE_WEBHOOK_SECRET: ${EMAILENGINE_WEBHOOK_SECRET:-dev-emailhub-secret}
      EMAILENGINE_WEBHOOK_MAX_SKEW_SECONDS: ${EMAILENGINE_WEBHOOK_MAX_SKEW_SECONDS:-600}
      EMAILENGINE_AUTH_SERVER_SECRET: ${EMAILENGINE_AUTH_SERVER_SECRET:-dev-emailhub-secret}
      HERMES_PROVIDER: ${HERMES_PROVIDER:-hermes}
      HERMES_CHAT_COMPLETIONS_URL: ${HERMES_CHAT_COMPLETIONS_URL:-}
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      HERMES_MODEL: ${HERMES_MODEL:-hermes-email}
      HERMES_VERSION_CHECK_URL: ${HERMES_VERSION_CHECK_URL:-}
      COMPOSE_ATTACHMENT_BLOB_DIR: ${COMPOSE_ATTACHMENT_BLOB_DIR:-/data/email-hub/compose-attachments}
      PROTON_BRIDGE_HOST: ${PROTON_BRIDGE_HOST:-host.docker.internal}
      PROTON_BRIDGE_IMAP_PORT: ${PROTON_BRIDGE_IMAP_PORT:-1143}
      PROTON_BRIDGE_SMTP_PORT: ${PROTON_BRIDGE_SMTP_PORT:-1025}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_TOKEN_URL: ${GOOGLE_OAUTH_TOKEN_URL:-https://oauth2.googleapis.com/token}
      GOOGLE_OAUTH_AUTHORIZATION_URL: ${GOOGLE_OAUTH_AUTHORIZATION_URL:-https://accounts.google.com/o/oauth2/v2/auth}
      GMAIL_PROFILE_URL: ${GMAIL_PROFILE_URL:-https://gmail.googleapis.com/gmail/v1/users/me/profile}
      GMAIL_API_BASE_URL: ${GMAIL_API_BASE_URL:-https://gmail.googleapis.com/gmail/v1}
      MICROSOFT_OAUTH_CLIENT_ID: ${MICROSOFT_OAUTH_CLIENT_ID:-}
      MICROSOFT_OAUTH_CLIENT_SECRET: ${MICROSOFT_OAUTH_CLIENT_SECRET:-}
      MICROSOFT_OAUTH_TENANT: ${MICROSOFT_OAUTH_TENANT:-common}
      MICROSOFT_OAUTH_TOKEN_URL: ${MICROSOFT_OAUTH_TOKEN_URL:-https://login.microsoftonline.com/common/oauth2/v2.0/token}
      MICROSOFT_OAUTH_AUTHORIZATION_URL: ${MICROSOFT_OAUTH_AUTHORIZATION_URL:-https://login.microsoftonline.com/common/oauth2/v2.0/authorize}
      MICROSOFT_GRAPH_PROFILE_URL: ${MICROSOFT_GRAPH_PROFILE_URL:-https://graph.microsoft.com/v1.0/me}
      MICROSOFT_GRAPH_BASE_URL: ${MICROSOFT_GRAPH_BASE_URL:-https://graph.microsoft.com/v1.0}
      MICROSOFT_GRAPH_SCOPE: ${MICROSOFT_GRAPH_SCOPE:-offline_access https://graph.microsoft.com/Mail.Read}
    volumes:
      - emailhub-compose-attachments:/data/email-hub/compose-attachments
    ports:
      - "${API_BIND:-127.0.0.1:8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s

  worker:
    build:
      context: ..
      dockerfile: apps/worker-node/Dockerfile
    restart: unless-stopped
    ulimits:
      nofile:
        soft: ${EMAILHUB_NOFILE_SOFT:-65535}
        hard: ${EMAILHUB_NOFILE_HARD:-65535}
    depends_on:
      postgres:
        condition: service_healthy
      emailengine:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-emailhub}:${POSTGRES_PASSWORD:-emailhub_dev}@postgres:5432/${POSTGRES_DB:-emailhub}}
      EMAILENGINE_URL: http://emailengine:3000
      EMAILENGINE_ACCESS_TOKEN: ${EMAILENGINE_ACCESS_TOKEN:-}
      EENGINE_PREPARED_TOKEN: ${EENGINE_PREPARED_TOKEN:-}
      EMAILENGINE_WEBHOOK_SECRET: ${EMAILENGINE_WEBHOOK_SECRET:-dev-emailhub-secret}
      PROTON_BRIDGE_HOST: ${PROTON_BRIDGE_HOST:-host.docker.internal}
      PROTON_BRIDGE_IMAP_PORT: ${PROTON_BRIDGE_IMAP_PORT:-1143}
      PROTON_BRIDGE_SMTP_PORT: ${PROTON_BRIDGE_SMTP_PORT:-1025}
      COMPOSE_ATTACHMENT_BLOB_DIR: ${COMPOSE_ATTACHMENT_BLOB_DIR:-/data/email-hub/compose-attachments}
      COMPOSE_ATTACHMENT_CLEANUP_RETENTION_HOURS: ${COMPOSE_ATTACHMENT_CLEANUP_RETENTION_HOURS:-168}
      COMPOSE_ATTACHMENT_CLEANUP_INTERVAL_MS: ${COMPOSE_ATTACHMENT_CLEANUP_INTERVAL_MS:-3600000}
      COMPOSE_ATTACHMENT_CLEANUP_LIMIT: ${COMPOSE_ATTACHMENT_CLEANUP_LIMIT:-100}
      HERMES_RETENTION_DAYS: ${HERMES_RETENTION_DAYS:-30}
      HERMES_RETENTION_CLEANUP_INTERVAL_MS: ${HERMES_RETENTION_CLEANUP_INTERVAL_MS:-3600000}
      HERMES_RETENTION_CLEANUP_LIMIT: ${HERMES_RETENTION_CLEANUP_LIMIT:-500}
      WORKER_LEASE_SECONDS: ${WORKER_LEASE_SECONDS:-60}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      WORKER_POLL_MS: ${WORKER_POLL_MS:-5000}
      WORKER_HEALTH_REQUIRE_EMAILENGINE_TOKEN: ${WORKER_HEALTH_REQUIRE_EMAILENGINE_TOKEN:-false}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_TOKEN_URL: ${GOOGLE_OAUTH_TOKEN_URL:-https://oauth2.googleapis.com/token}
      GMAIL_API_BASE_URL: ${GMAIL_API_BASE_URL:-https://gmail.googleapis.com/gmail/v1}
      MICROSOFT_OAUTH_CLIENT_ID: ${MICROSOFT_OAUTH_CLIENT_ID:-}
      MICROSOFT_OAUTH_CLIENT_SECRET: ${MICROSOFT_OAUTH_CLIENT_SECRET:-}
      MICROSOFT_OAUTH_TENANT: ${MICROSOFT_OAUTH_TENANT:-common}
      MICROSOFT_OAUTH_TOKEN_URL: ${MICROSOFT_OAUTH_TOKEN_URL:-https://login.microsoftonline.com/common/oauth2/v2.0/token}
      MICROSOFT_GRAPH_BASE_URL: ${MICROSOFT_GRAPH_BASE_URL:-https://graph.microsoft.com/v1.0}
      MICROSOFT_GRAPH_SCOPE: ${MICROSOFT_GRAPH_SCOPE:-offline_access https://graph.microsoft.com/Mail.Read}
    volumes:
      - emailhub-compose-attachments:/data/email-hub/compose-attachments
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "npm run healthcheck -w apps/worker-node"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_EMAILHUB_API_TOKEN: ${VITE_EMAILHUB_API_TOKEN:-}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_BIND:-127.0.0.1:5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  emailhub-compose-attachments:
  emailhub-postgres:
  emailhub-redis:
